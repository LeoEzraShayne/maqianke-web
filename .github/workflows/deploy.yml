name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: maqianke-web-production
  cancel-in-progress: false

jobs:
  verify-and-deploy:
    name: Verify and deploy to Cloudflare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.9.0

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check and build website
        run: pnpm build

      - name: Deploy Cloudflare Worker
        run: pnpm exec wrangler deploy -c wrangler.deploy.jsonc

      - name: Verify production website
        run: curl --fail --retry 10 --retry-delay 2 --retry-all-errors https://maqianke.meritledger.org/
